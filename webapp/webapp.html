<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Euro Car Market Simulator</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: url('https://4kwallpapers.com/images/wallpapers/porsche-911-gt3-5120x2880-24513.jpg') no-repeat center center fixed; 
            background-size: cover;
            padding: 20px; 
            text-align: center; 
        }
        .box { 
            background: rgba(255, 255, 255, 0.90); /* Slightly transparent white to see background */
            width: 450px; 
            margin: auto; 
            padding: 20px; 
            border: 1px solid #dadada; 
            border-radius: 8px; 
        }
        .stock-item { margin: 15px 0; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .price { font-size: 20px; font-weight: bold; color: red; }
        a {color: rgb(0, 0, 0); text-decoration: none;}
/* user interaction with the links */
        a:hover {text-decoration: underline;}
        a:visited {color: #3f364e;}
        .title { text-decoration: underline overline; text-decoration-color: rgb(109, 176, 240); }
    </style>
</head>
<body>

<div class="box">
    <h1 class="title">Euro Car Market Simulator</h1>
    <p>Press to get latest simulated market prices:</p>
    
    <div id="stocks">
        <div class="stock-item">Porsche (PAG911): <span id="price-PAG911" class="price">--.--</span></div>
        <div class="stock-item">Mercedes (MBG): <span id="price-MBG" class="price">--.--</span></div>
        <div class="stock-item">BMW (BMW): <span id="price-BMW" class="price">--.--</span></div>
    </div>

    <button onclick="fetchAllStocks()" style="margin-top: 15px;"> Refresh Prices</button>
    <br><br>
    <a href="../from-scratch/from-scratch.html">Back to Porsche 964 Page</a>
    <br><br>
    <a href="../index.html">Back to Resume Page</a>
</div>

<script>
    async function fetchAllStocks() {
        const tickers = ['PAG911.DE', 'MBG.DE', 'BMW.DE'];
        
        for (let ticker of tickers) {
            const displayId = 'price-' + ticker.split('.')[0];
            document.getElementById(displayId).innerText = "Loading...";
            
            try {
                // Using sandbox API for simulation
                const response = await fetch(`https://financialmodelingprep.com/api/v3/quote/${ticker}?apikey=demo`);
                const data = await response.json();
                document.getElementById(displayId).innerText = "$" + data[0].price.toFixed(2);
            } catch (error) {
                // Fallback simulation if API is unreachable
                const basePrices = { 'PAG911': 6, 'MBG': 14, 'BMW': 24 };
                const base = basePrices[ticker.split('.')[0]];
                document.getElementById(displayId).innerText = "$" + (base + Math.random() * 5).toFixed(2);
            }
        }
    }
</script>

</body>
</html>
